name: Build macOS release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload the archive to"
        required: true
        default: "v0.2.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_arch: arm64
          npm_config_platform: darwin

      - name: Verify Electron runtime architecture
        run: |
          set -euo pipefail
          file node_modules/electron/dist/Electron.app/Contents/MacOS/Electron
          file node_modules/electron/dist/Electron.app/Contents/MacOS/Electron | grep arm64

      - name: Build package
        run: npm run build:mac

      - name: Verify release archive exists
        run: |
          set -euo pipefail
          ls -lh out/*.tar.xz
          ls -lh out/*.zip
          test -n "$(find out -maxdepth 1 -name '*.tar.xz' -print -quit)"
          test -n "$(find out -maxdepth 1 -name '*.zip' -print -quit)"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" out/*.tar.xz out/*.zip --repo "$GITHUB_REPOSITORY" --clobber
